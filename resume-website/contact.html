<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Xie Yongqing">
  <title>联系 · 谢泳清</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-transition">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grain-overlay"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">Xie Yongqing <span data-i18n="brand.sub">· 简历</span></a>
      <ul class="nav-links">
        <li><a href="index.html" data-i18n="nav.home">首页</a></li>
        <li><a href="about.html" data-i18n="nav.about">关于我</a></li>
        <li><a href="skills.html" data-i18n="nav.skills">技能</a></li>
        <li><a href="experience.html" data-i18n="nav.experience">经历</a></li>
        <li><a href="contact.html" class="active" data-i18n="nav.contact">联系</a></li>
        <li><div class="lang-toggle">
          <span class="lang-option active" data-lang="zh">中</span>
          <span class="lang-option" data-lang="en">EN</span>
        </div></li>
      </ul>
      <button class="menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="sub-hero">
    <div class="container reveal">
      <span class="section-tag" data-i18n="contact.tag">Contact</span>
      <h1 data-i18n="contact.title">联系我</h1>
      <p data-i18n="contact.subtitle">期待与您的沟通</p>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="contact-split">

        <!-- Form -->
        <div class="glass glass-lg contact-form-panel reveal">
          <form id="contactForm">
            <div class="form-group">
              <label for="contactName" data-i18n="contact.name">姓名</label>
              <input type="text" id="contactName" data-i18n="contact.name.ph" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
              <label for="contactEmail" data-i18n="contact.email">邮箱</label>
              <input type="email" id="contactEmail" data-i18n="contact.email.ph" placeholder="请输入您的邮箱" required>
            </div>
            <div class="form-group">
              <label for="contactMsg" data-i18n="contact.msg">留言</label>
              <textarea id="contactMsg" data-i18n="contact.msg.ph" placeholder="请输入您的留言内容..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="contact.submit">发送留言</button>
          </form>
        </div>

        <!-- Info -->
        <div class="contact-info-panel reveal">
          <div class="glass ci-block">
            <div class="ci-ic">✉️</div>
            <div>
              <div class="ci-lbl" data-i18n="contact.email.label">邮箱地址</div>
              <a href="mailto:xyq197@qq.com" class="ci-val">xyq197@qq.com</a>
            </div>
          </div>
          <div class="glass ci-block">
            <div class="ci-ic">📱</div>
            <div>
              <div class="ci-lbl" data-i18n="contact.phone.label">联系电话</div>
              <div class="ci-val">15083593021</div>
            </div>
          </div>
          <div class="glass ci-block">
            <div class="ci-ic">📍</div>
            <div>
              <div class="ci-lbl" data-i18n="contact.location.label">所在地</div>
              <div class="ci-val">哈尔滨市</div>
            </div>
          </div>

          <div class="glass contact-extra">
            <p style="color:var(--text-muted);font-size:0.83rem;margin-bottom:14px;">扫码或点击下方按钮直接联系</p>
            <div style="display:flex;gap:12px;justify-content:center;">
              <a href="mailto:xyq197@qq.com" class="btn btn-outline" style="font-size:0.83rem;">📧 发送邮件</a>
              <a href="tel:15083593021" class="btn btn-outline" style="font-size:0.83rem;">📞 拨打电话</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container"><p data-i18n="footer">© 2026 谢泳清 · 个人简历 | Designed with care</p></div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
